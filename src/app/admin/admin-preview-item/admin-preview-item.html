<div class="inline">
  <div>
    <img [src]="data()?.imgSrc" alt="">
  </div>
  <div>
    <a href=""> {{data()?.name}} </a>
  </div>
</div>
<div class="inline">
  <svg (click)="onClick()">
    <use href="#trash"></use>
  </svg>
</div>

<div [className]="hidden===true?'hidden': 'specification'">
  <div>
    Ви справді хочете видалити <br>
    {{data()?.name}}?
    <div>
      <app-button (click)="delElement(data()?.id)">Так</app-button>
      <app-button (click)="onClick()">Ні</app-button>
    </div>
  </div>
</div>
